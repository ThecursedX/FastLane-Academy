<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lesson Scheduling System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
    <h2 class="text-center mb-4">Driving School Lesson Scheduling</h2>

    <!-- Student Request Form -->
    <div class="card mb-4">
        <div class="card-header">Request Lesson</div>
        <div class="card-body">
            <div class="row g-2">
                <div class="col">
                    <input id="studentId" class="form-control" placeholder="Student ID">
                </div>
                <div class="col">
                    <input id="instructorId" class="form-control" placeholder="Instructor ID">
                </div>
                <div class="col">
                    <input id="date" type="date" class="form-control">
                </div>
                <div class="col">
                    <input id="time" type="time" class="form-control">
                </div>
                <div class="col">
                    <button class="btn btn-primary w-100" onclick="requestLesson()">Request</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Admin Process Queue -->
    <div class="card mb-4">
        <div class="card-header">Admin - Process Queue</div>
        <div class="card-body">
            <button class="btn btn-success" onclick="processNextLesson()">Process Next Lesson</button>
            <p id="processResult" class="mt-3"></p>
        </div>
    </div>

    <!-- Lesson List -->
    <div class="card">
        <div class="card-header">All Lessons</div>
        <div class="card-body">
            <button class="btn btn-secondary mb-3" onclick="loadLessons()">Refresh</button>
            <table class="table table-bordered">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Student</th>
                    <th>Instructor</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Status</th>
                </tr>
                </thead>
                <tbody id="lessonTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const BASE_URL = "http://localhost:8080/api/lessons";

    function requestLesson(){
      const data = {
        studentId: document.getElementById('studentId').value,
        instructorId: document.getElementById('instructorId').value,
        date: document.getElementById('date').value,
        time: document.getElementById('time').value
      };

      fetch(BASE_URL + "/requestLesson", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
      })
      .then(res => res.json())
      .then(data => {
        alert(data.message);
        loadLessons();
      });
    }

    function processNextLesson(){
      fetch(BASE_URL + "/processNextLesson", { method: "POST" })
      .then(res => res.json())
      .then(data => {
        document.getElementById("processResult").innerText = data.message;
        loadLessons();
      });
    }

    function loadLessons(){
      fetch(BASE_URL + "/getAll")
      .then(res => res.json())
      .then(data => {
        const table = document.getElementById("lessonTable");
        table.innerHTML = "";

        data.content.forEach(lesson => {
          let color = "";
          if(lesson.status === "PENDING") color = "text-warning";
          if(lesson.status === "SCHEDULED") color = "text-success";
          if(lesson.status === "REJECTED") color = "text-danger";

          table.innerHTML += `
            <tr>
              <td>${lesson.lessonId}</td>
              <td>${lesson.studentId}</td>
              <td>${lesson.instructorId}</td>
              <td>${lesson.date}</td>
              <td>${lesson.time}</td>
              <td class="${color}">${lesson.status}</td>
            </tr>
          `;
        });
      });
    }

    loadLessons();
</script>

</body>
</html>
